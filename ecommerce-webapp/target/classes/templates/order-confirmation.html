<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Xác nhận đơn hàng - Stella E-commerce">
    <title>Đặt hàng thành công — Stella</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: #f5f3ef;
            color: #1a1a1a;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        a { text-decoration: none; color: inherit; }

        .container { max-width: 1340px; margin: 0 auto; padding: 0 40px; }

        /* Navbar */
        .navbar {
            background: #ffffff;
            padding: 0 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 72px;
            box-shadow: 0 1px 0 rgba(0,0,0,0.06);
        }
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: #1a1a1a;
            letter-spacing: -0.02em;
            text-transform: uppercase;
        }

        /* Progress bar */
        .progress-bar {
            background: #ffffff;
            border-bottom: 1px solid #eee;
            padding: 20px 0;
        }
        .steps {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .step {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.82rem;
            font-weight: 600;
            color: #ccc;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .step.completed { color: #2d7a56; }
        .step-number {
            width: 28px;
            height: 28px;
            border-radius: 9999px;
            border: 2px solid #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.72rem;
            font-weight: 700;
        }
        .step.completed .step-number {
            border-color: #2d7a56;
            background: #2d7a56;
            color: white;
        }
        .step-connector {
            width: 60px;
            height: 2px;
            background: #eee;
            margin: 0 12px;
        }
        .step-connector.done { background: #2d7a56; }

        /* Confirmation content */
        .confirmation-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
        }
        .confirmation-card {
            background: white;
            border-radius: 20px;
            border: 1px solid #f0ece4;
            padding: 56px 48px;
            max-width: 560px;
            width: 100%;
            text-align: center;
        }

        .success-icon-circle {
            width: 80px;
            height: 80px;
            background: #ecfdf5;
            border-radius: 9999px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 28px auto;
            animation: scaleIn 0.5s ease;
        }
        @keyframes scaleIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .confirmation-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 8px;
        }
        .confirmation-subtitle {
            font-size: 0.92rem;
            color: #999;
            margin-bottom: 36px;
        }

        .order-details-card {
            background: #faf9f6;
            border-radius: 14px;
            padding: 24px;
            text-align: left;
            margin-bottom: 32px;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f0ece4;
        }
        .detail-row:last-child { border-bottom: none; }
        .detail-label {
            font-size: 0.85rem;
            color: #888;
            font-weight: 500;
        }
        .detail-value {
            font-size: 0.92rem;
            font-weight: 600;
            color: #1a1a1a;
        }
        .detail-value.status {
            background: #ecfdf5;
            color: #065f46;
            padding: 4px 14px;
            border-radius: 9999px;
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .detail-value.total {
            font-size: 1.15rem;
            font-weight: 800;
            color: #2d4a3e;
        }

        .back-home-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 36px;
            background: #1a1a1a;
            color: white;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 0.03em;
            transition: all 0.3s ease;
        }
        .back-home-btn:hover {
            background: #2d4a3e;
            box-shadow: 0 8px 24px rgba(45,74,62,0.25);
            transform: translateY(-2px);
        }

        /* Footer */
        .footer {
            background: #1a1a1a;
            color: #555;
            padding: 24px 0;
            text-align: center;
            font-size: 0.78rem;
            margin-top: auto;
        }

        @media (max-width: 768px) {
            .navbar { padding: 0 16px; height: 60px; }
            .confirmation-card { padding: 36px 24px; }
            .confirmation-title { font-size: 1.5rem; }
            .steps { flex-wrap: wrap; gap: 8px; }
            .step-connector { width: 30px; }
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <a href="/" class="logo">Stella</a>
    </nav>

    <!-- Progress bar -->
    <div class="progress-bar">
        <div class="container">
            <div class="steps">
                <div class="step completed">
                    <span class="step-number">✓</span>
                    <span>Giỏ hàng</span>
                </div>
                <div class="step-connector done"></div>
                <div class="step completed">
                    <span class="step-number">✓</span>
                    <span>Thanh toán</span>
                </div>
                <div class="step-connector done"></div>
                <div class="step completed">
                    <span class="step-number">✓</span>
                    <span>Xác nhận</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Confirmation -->
    <div class="confirmation-wrapper" data-testid="confirmation-container">
        <div class="confirmation-card">
            <div class="success-icon-circle" data-testid="success-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#059669" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
            </div>

            <h1 class="confirmation-title" id="confirmation-title" data-testid="confirmation-title">Đặt hàng thành công!</h1>
            <p class="confirmation-subtitle">Cảm ơn bạn đã mua sắm tại Stella. Đơn hàng của bạn đang được xử lý.</p>

            <div class="order-details-card" data-testid="order-details">
                <div class="detail-row">
                    <span class="detail-label">Mã đơn hàng</span>
                    <span class="detail-value" id="order-id" data-testid="order-id" th:text="'#' + ${order.id}">0</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Trạng thái</span>
                    <span class="detail-value status" id="order-status" data-testid="order-status" th:text="${order.status}">PENDING</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Số sản phẩm</span>
                    <span class="detail-value" data-testid="item-count" th:text="${order.items.size()} + ' sản phẩm'">0</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Tổng tiền</span>
                    <span class="detail-value total" id="total-amount" data-testid="total-amount"
                          th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' VND'">0 VND</span>
                </div>
            </div>

            <a href="/" class="back-home-btn" id="back-home-btn" data-testid="back-home-button">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                Quay về trang chủ
            </a>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <span>&copy; 2025 Stella. Thiết kế với ❤️ tại Việt Nam.</span>
        </div>
    </footer>

</body>
</html>
